name: Sports Data Pipeline — Daily ETL

# ──────────────────────────────────────────────────────────────
# Triggers
# ──────────────────────────────────────────────────────────────
on:
  schedule:
    # Runs every day at 00:00 UTC
    # Cron syntax: minute hour day-of-month month day-of-week
    - cron: "0 0 * * *"
  # Allow manual trigger from GitHub Actions UI
  workflow_dispatch:
    inputs:
      sport:
        description: "Sport to fetch (football or cricket)"
        required: false
        default: "football"
        type: choice
        options:
          - football
          - cricket
      debug_mode:
        description: "Enable verbose debug logging"
        required: false
        default: "false"
        type: boolean

# ──────────────────────────────────────────────────────────────
# Permissions — required to push commits back to the repo
# ──────────────────────────────────────────────────────────────
permissions:
  contents: write

# ──────────────────────────────────────────────────────────────
# Jobs
# ──────────────────────────────────────────────────────────────
jobs:
  run-pipeline:
    name: "ETL Pipeline — ${{ github.event.inputs.sport || 'football' }}"
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      # ── 1. Checkout ────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Fetch full history so contribution graph credits are accurate
          fetch-depth: 0

      # ── 2. Python setup ───────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # ── 3. Cache pip dependencies ─────────────────────────
      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      # ── 4. Install dependencies ───────────────────────────
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # ── 5. Ensure output directories exist ────────────────
      - name: Create output directories
        run: |
          mkdir -p data/raw data/processed reports logs

      # ── 6. Run the pipeline ───────────────────────────────
      - name: Run data pipeline
        env:
          # ────────────────────────────────────────────────────
          # REQUIRED: Add these as GitHub Repository Secrets
          # Settings → Secrets and variables → Actions → New secret
          # ────────────────────────────────────────────────────
          FOOTBALL_API_KEY: ${{ secrets.FOOTBALL_API_KEY }}
          SPORT: ${{ github.event.inputs.sport || 'football' }}
          COMPETITION_CODE: "PL"
          ENABLE_ML: "false"
          ENABLE_NN: "false"
        run: |
          echo "🚀 Starting pipeline for sport: $SPORT"
          python main.py
          echo "✅ Pipeline completed successfully"

      # ── 7. Upload artifacts (logs + reports) ──────────────
      - name: Upload pipeline artifacts
        if: always()  # Run even if pipeline fails — helps with debugging
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-output-${{ github.run_number }}
          path: |
            logs/
            reports/
          retention-days: 30

      # ── 8. Commit & push updated data ────────────────────
      - name: Commit and push data
        run: |
          git config --global user.name "sxddhxrthg"
          git config --global user.email "ganesh.siddharth@gmail.com"
          
          # First, save any real football data from your ETL pipeline
          git add data/ reports/ || true
          git commit -m "Automated ETL data update: $(date +'%Y-%m-%d')" || true
          
          # Now, generate the random 4 to 12 heartbeat commits
          NUM_COMMITS=$(( (RANDOM % 9) + 4 ))
          echo "Generating $NUM_COMMITS random commits to boost GitHub graph..."
          
          for i in $(seq 1 $NUM_COMMITS); do
            echo "Heartbeat $i at $(date)" > daily_heartbeat.txt
            git add daily_heartbeat.txt
            git commit -m "Automated contribution $i - $(date +'%H:%M:%S')"
            sleep 1 # Adds a 1-second pause so timestamps are unique
          done
          
          # Push everything to GitHub
          git push

      # ── 9. Post-run summary ───────────────────────────────
      - name: Print run summary
        if: always()
        run: |
          echo "## Pipeline Run Summary" >> $GITHUB_STEP_SUMMARY
          echo "| Property | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Run Number | ${{ github.run_number }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Triggered By | ${{ github.event_name }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Sport | ${{ github.event.inputs.sport || 'football' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Timestamp (UTC) | $(date -u) |" >> $GITHUB_STEP_SUMMARY
          if [ -f "data/processed/football_data_latest.csv" ]; then
            ROWS=$(tail -n +2 data/processed/football_data_latest.csv | wc -l)
            echo "| Rows Processed | $ROWS |" >> $GITHUB_STEP_SUMMARY
          fi